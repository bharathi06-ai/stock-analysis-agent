<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ════════════════════════════════════════
     NAVIGATION
════════════════════════════════════════ -->
<header class="sd-nav">
  <div class="sd-nav-inner">

    <div class="sd-brand">
      <svg class="sd-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
        <rect width="32" height="32" fill="#db0011"/>
        <rect x="5"  y="5"  width="9" height="9" fill="#fff"/>
        <rect x="18" y="5"  width="9" height="9" fill="#fff"/>
        <rect x="5"  y="18" width="9" height="9" fill="#fff"/>
        <rect x="18" y="18" width="9" height="9" fill="#fff"/>
      </svg>
      <span class="sd-brand-name">StockDesk</span>
    </div>

    <nav class="sd-nav-links" aria-label="Main navigation">
      <a class="sd-nav-link sd-nav-link--active" href="#">Upload</a>
      <a class="sd-nav-link" href="#">Companies</a>
    </nav>

  </div>
</header>


<!-- ════════════════════════════════════════
     SCREEN 1 — UPLOAD
════════════════════════════════════════ -->
<main class="sd-main">

  <!-- ── Section 1 : Upload form ───────────────────────── -->
  <section class="sd-card" aria-label="Upload report">

    <div class="sd-card-head">
      <h1 class="sd-card-title">Upload Report</h1>
      <p class="sd-card-sub">Add an annual or quarterly financial report. PDF text is extracted in your browser — no file content is stored on the server.</p>
    </div>

    <form id="upload-form" class="sd-form" novalidate>

      <!-- Company name -->
      <div class="sd-field">
        <label class="sd-label" for="inp-company">Company Name</label>
        <input class="sd-input" type="text" id="inp-company" name="company_name"
               placeholder="e.g. HSBC Holdings" autocomplete="off" spellcheck="false">
      </div>

      <!-- Sector -->
      <div class="sd-field">
        <label class="sd-label" for="inp-sector">Sector</label>
        <select class="sd-select" id="inp-sector" name="sector">
          <option value="" disabled selected>Select sector…</option>
          <option value="Banks">Banks</option>
          <option value="Insurance">Insurance</option>
          <option value="Real Estate">Real Estate</option>
          <option value="Industrials">Industrials</option>
          <option value="Technology">Technology</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Energy">Energy</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- File type radios -->
      <div class="sd-field">
        <span class="sd-label">File Type</span>
        <div class="sd-radios">
          <label class="sd-radio">
            <input type="radio" name="file_type" value="excel" id="ft-excel" checked>
            <span class="sd-radio-pip"></span>
            <span class="sd-radio-lbl">Excel</span>
          </label>
          <label class="sd-radio">
            <input type="radio" name="file_type" value="pdf" id="ft-pdf">
            <span class="sd-radio-pip"></span>
            <span class="sd-radio-lbl">PDF</span>
          </label>
        </div>
      </div>

      <!-- Period type + Year -->
      <div class="sd-field sd-field--inline">
        <div class="sd-field-unit">
          <label class="sd-label" for="inp-period">Period Type</label>
          <select class="sd-select" id="inp-period" name="period_type">
            <option value="annual">Annual</option>
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
        </div>
        <div class="sd-field-unit">
          <label class="sd-label" for="inp-year">Year</label>
          <input class="sd-input sd-input--year" type="number" id="inp-year"
                 min="2000" max="2099" step="1">
        </div>
      </div>

      <!-- File picker -->
      <div class="sd-field">
        <label class="sd-label">File</label>
        <div class="sd-file-row">
          <button type="button" class="sd-btn-file" id="file-btn"
                  onclick="document.getElementById('file-input').click()">
            Choose file…
          </button>
          <span class="sd-file-chosen" id="file-chosen">No file chosen</span>
        </div>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
      </div>

      <!-- Progress / spinner -->
      <div id="upload-status" class="sd-status hidden" role="status" aria-live="polite">
        <div class="sd-spinner" aria-hidden="true"></div>
        <span id="upload-status-msg" class="sd-status-msg"></span>
      </div>

      <!-- Feedback messages -->
      <div id="upload-success" class="sd-msg-ok  hidden" role="alert"></div>
      <div id="upload-error"   class="sd-msg-err hidden" role="alert"></div>

      <!-- Submit -->
      <div class="sd-field sd-field--submit">
        <button type="submit" class="sd-btn-primary" id="upload-btn">Upload</button>
      </div>

    </form>
  </section>


  <!-- ── Section 2 : Reports table ─────────────────────── -->
  <section class="sd-card" aria-label="Uploaded reports">

    <div class="sd-card-head">
      <h2 class="sd-card-title">Uploaded Reports</h2>
    </div>

    <div id="reports-wrap" class="sd-reports-wrap">
      <p class="sd-state-text">Loading…</p>
    </div>

  </section>

</main>

<script src="/static/js/main.js"></script>
</body>
</html>
