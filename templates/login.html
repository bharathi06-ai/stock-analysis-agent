<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockGPT for Siva — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --bg3:     #1c2230;
      --border:  #21262d;
      --border2: #30363d;
      --text:    #e6edf3;
      --text2:   #8b949e;
      --accent:  #4f7eff;
      --accent2: #1d6fee;
      --red:     #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .brand {
      margin-bottom: 1.75rem;
    }

    .brand-flag {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .brand-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand-title .for-siva {
      color: var(--accent);
    }

    .brand-sub {
      font-size: 0.78rem;
      color: var(--text2);
      margin-top: 0.2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    input[type="password"] {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
    }

    button[type="submit"] {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem;
      transition: background 0.15s;
      width: 100%;
    }

    button[type="submit"]:hover {
      background: var(--accent2);
    }

    .error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <span class="brand-flag">🇸🇪</span>
      <h1 class="brand-title">StockGPT <span class="for-siva">for Siva</span></h1>
      <p class="brand-sub">Swedish Stock Analysis · Nasdaq Stockholm</p>
    </div>

    <form method="POST">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password">
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
